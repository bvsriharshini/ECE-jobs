name: Auto Update ECE Jobs

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write        # ← THIS is what's probably missing
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Fetch and filter jobs
        run: python filter_jobs.py

      - name: Commit changes
        run: |
          git config user.name "Harshini Bot"
          git config user.email "bot@github.com"
          git add index.html
          git commit --allow-empty -m "Auto-update: $(date -u '+%Y-%m-%d %H:%M UTC')" || echo "Nothing to commit"
          git push || echo "Push skipped"
