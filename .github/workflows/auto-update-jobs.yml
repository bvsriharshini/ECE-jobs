name: Auto Update ECE Jobs

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Fetch public jobs
        run: curl -L -o public.md https://raw.githubusercontent.com/zapplyjobs/New-Grad-Hardware-Engineering-Jobs-2026/main/README.md

      - name: Add header and keep jobs
        run: |
          echo "# Harshini's Personal ECE Job Tracker – 2026 Entry-Level / New Grad (OPT/F1)" > new.md
          echo "" >> new.md
          echo "**My Focus**" >> new.md
          echo "Entry-level roles in US (no citizenship/clearance)." >> new.md
          echo "Target: DV • SOC • GPU • Analog • Board Bring-up • ASIC • Physical • Memory • Hardware" >> new.md
          echo "" >> new.md
          echo "**Auto-update**: Every ~6 hours" >> new.md
          echo "" >> new.md
          echo "---" >> new.md
          echo "" >> new.md
          cat public.md >> new.md
          mv new.md README.md

      - name: Commit changes
        run: |
          git config user.name "Harshini Bot"
          git config user.email "bot@github.com"
          git add README.md
          git commit -m "Auto-update: Fresh jobs" || echo "No change"
          git push || echo "Push skipped"
