name: Sync ECE Jobs

on:
  schedule:
    - cron: '0 */4 * * *'
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Fetch and filter jobs
        run: |
          python3 - <<'EOF'
          import requests, re
          from datetime import datetime, timezone

          SOURCE_URL = "https://raw.githubusercontent.com/zapplyjobs/New-Grad-Hardware-Engineering-Jobs-2026/main/README.md"

          KEEP = ["verification","asic","fpga","soc","embedded","firmware",
                  "analog","mixed.signal","electrical","signal integrity","layout",
                  "physical design","dft","bring.up","hardware engineer","circuit design",
                  "rtl","vlsi","memory","dsp","rf","pcb"]

          DROP = ["hvac","fitness","graphic designer","supply chain","facilities",
                  "manufacturing tech","civil","cosmoquick","medical","dental",
                  "site reliability engineer","clerical","accounting"]

          def matches(text):
              t = text.lower()
              if any(re.search(k, t) for k in DROP): return False
              return any(re.search(k, t) for k in KEEP)

          r = requests.get(SOURCE_URL, timeout=30)
          r.raise_for_status()
          rows = [l for l in r.text.splitlines() if l.startswith("| 🏢") and "[Apply]" in l and matches(l)]

          now = datetime.now(timezone.utc).strftime("%Y-%m-%d %H:%M UTC")
          content = f"""<style>
          body {{ font-family: Arial; max-width: 1100px; margin: 0 auto; padding: 30px; background: #f9fbfd; color: #333; }}
          h1 {{ color: #1e40af; }} h2 {{ color: #1e3a8a; border-bottom: 2px solid #ddd; padding-bottom: 8px; }}
          table {{ border-collapse: collapse; width: 100%; margin: 20px 0; background: white; }}
          th, td {{ border: 1px solid #ddd; padding: 12px; text-align: left; }}
          th {{ background: #eff6ff; font-weight: bold; }}
          a {{ color: #2563eb; text-decoration: none; }}
          </style>

          # Harshini's ECE Job Board – Auto-Updated
          **OPT/F1 Friendly | Entry-Level & New Grad | DV · ASIC · FPGA · Analog · Embedded**

          🕐 Last updated: **{now}**
          📌 Source: [zapplyjobs/New-Grad-Hardware-Engineering-Jobs-2026](https://github.com/zapplyjobs/New-Grad-Hardware-Engineering-Jobs-2026)

          ---

          ## 🔄 Latest ECE Jobs ({len(rows)} filtered)

          | Company | Role | Location | Posted | Apply |
          |---------|------|----------|--------|-------|
          """ + "\n".join(rows) + "\n\n---\n_Auto-refreshes every 4 hours._\n"

          with open("README.md", "w") as f:
              f.write(content)

          print(f"✅ Wrote {len(rows)} jobs to README.md")
          EOF

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add README.md
          git diff --cached --quiet || git commit -m "Auto-update ECE jobs [$(date -u '+%Y-%m-%d %H:%M UTC')]"
          git push
