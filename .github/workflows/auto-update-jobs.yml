name: Auto Update ECE Jobs from Public Pool

on:
  schedule:
    - cron: '0 */6 * * *'   # every 6 hours
  workflow_dispatch:        # manual trigger button

jobs:
  update-readme:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Fetch latest jobs from public source
        run: |
          curl -L -o README.md https://raw.githubusercontent.com/zapplyjobs/New-Grad-Hardware-Engineering-Jobs-2026/main/README.md

      - name: Add your personal ECE header & filter note
        run: |
          cat > header.md << 'EOF'
      # Harshini's Personal ECE Job Tracker – 2026 Entry-Level / New Grad (OPT/F1)

            - name: Prepend personal header to public content
        run: |
          echo "# Harshini's Personal ECE Job Tracker – 2026 Entry-Level / New Grad (OPT/F1)" > header.md
          echo "" >> header.md
          echo "**My Focus**" >> header.md
          echo "Entry-level / new college grad roles in US (no citizenship/clearance required)." >> header.md
          echo "Target: Design Verification • SOC Verification • GPU DV • Analog/Mixed-Signal • Board Bring-up • ASIC • Physical Design • Layout • Memory Controller • Hardware/Process/Product/Field/System Applications Engineer" >> header.md
          echo "" >> header.md
          echo "**Auto-update**: Refreshes every ~6 hours. Bookmark: https://bvsriharshini.github.io/ECE-jobs/" >> header.md
          echo "" >> header.md
          echo "**Quick Tips**: Use resume highlights (UVM 100% coverage, Virtuoso LDO/boost, Zynq bring-up, pipeline 156% gain)" >> header.md
          echo "" >> header.md
          echo "---" >> header.md
          echo "" >> header.md
          cat header.md public-readme.md > README.md
          rm header.md public-readme.md
      **Last auto-update**: $(date)

      ---
      EOF
          cat header.md README.md > temp.md && mv temp.md README.md

      - name: Commit & push updated README
        run: |
          git config user.name "Harshini Auto Bot"
          git config user.email "noreply@github.com"
          git add README.md
          git commit -m "Auto-update: Fresh ECE jobs pulled" || echo "No changes to commit"
          git push
